services:
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard (never commit secrets)
      - key: CLIENT_ORIGIN
        sync: false          # Set to your Vercel frontend URL, e.g. https://taskflow.vercel.app
